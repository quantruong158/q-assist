<div [class]="isInitialChat() ? 'md:flex-none md:pb-0' : ''">
  @if (isConversationLoading()) {
    <div
      class="relative mx-auto mb-4 flex items-center gap-3 justify-center py-3 text-muted-foreground"
    >
      <hlm-spinner class="text-lg" aria-label="Loading conversation" />
      <span>Loading conversation...</span>
    </div>
  }

  @if (isInitialChat()) {
    <div
      class="mx-auto mt-25 h-[calc(32vh-var(--safe-area-bottom))] max-w-180 content-end px-4 py-4 text-foreground max-[600px]:mt-6 max-[600px]:px-4 max-[600px]:py-6"
    >
      <p class="text-2xl text-muted-foreground">Welcome, {{ currentUserDisplayName() }}</p>
      <p class="text-[2.5rem] leading-[1.4]">How can I help you?</p>
    </div>
  }

  @for (message of messages(); track $index) {
    <chat-message
      [content]="message.content"
      [role]="message.role"
      [attachments]="message.attachments"
    />
  }

  @if (isStreaming()) {
    <chat-message [content]="streamingContent()" role="assistant" [isStreaming]="true" />
  }
</div>
