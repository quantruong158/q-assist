<hlm-dialog-header>
  <h3 hlmDialogTitle>Update Balance</h3>
  <p hlmDialogDescription>Update the balance for {{ data.source.name }}</p>
</hlm-dialog-header>

<finance-edit-balance-form [form]="form" [formId]="formId" (submitted)="submit()" />

<hlm-dialog-footer>
  <button hlmBtn type="button" variant="ghost" (click)="close()">Cancel</button>
  <button hlmBtn type="submit" form="edit-balance-form" [disabled]="isSubmitting() || form.invalid">
    {{ isSubmitting() ? 'Updating...' : 'Update Balance' }}
  </button>
</hlm-dialog-footer>
