<form [id]="formId()" [formGroup]="form()" (ngSubmit)="submitted.emit()">
  <div class="grid gap-4 py-4">
    <div class="grid grid-cols-4 items-center gap-4">
      <label hlmLabel for="balance" class="text-right">New Balance</label>
      <input
        hlmInput
        id="balance"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        financeMoneyFormatter
        formControlName="balance"
        placeholder="0 ₫"
        class="col-span-3"
      />
    </div>
  </div>
</form>
